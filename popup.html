<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-primary-hover: #2563eb;
      --accent-danger: #ef4444;
      --accent-danger-hover: #dc2626;
      --border-color: #334155;
    }

    html {
      overflow: hidden;
    }

    body {
      width: 340px;
      max-height: 580px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .header {
      margin-bottom: 12px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .field {
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    label {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .tooltip-wrapper {
      position: relative;
      display: inline-flex;
      margin-left: 6px;
    }

    .tooltip-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--border-color);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      cursor: help;
      transition: all 0.2s;
    }

    .tooltip-icon:hover {
      background-color: var(--accent-primary);
      color: white;
    }

    .tooltip-text {
      position: absolute;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%) translateY(5px);
      width: max-content;
      max-width: 180px;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 400;
      text-align: center;
      line-height: 1.3;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      z-index: 100;
    }

    .tooltip-text::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px;
      border-style: solid;
      border-color: var(--border-color) transparent transparent transparent;
    }

    .tooltip-wrapper:hover .tooltip-text {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Fixed alignment tooltips ensuring they never break the horizontal boundary */
    .tooltip-wrapper.align-right .tooltip-text {
      left: auto;
      right: -10px;
      transform: translateY(5px);
    }

    .tooltip-wrapper.align-right:hover .tooltip-text {
      transform: translateY(0);
    }

    .tooltip-wrapper.align-right .tooltip-text::after {
      left: auto;
      right: 12px;
      transform: none;
    }

    .tooltip-wrapper.align-left .tooltip-text {
      left: -10px;
      transform: translateY(5px);
    }

    .tooltip-wrapper.align-left:hover .tooltip-text {
      transform: translateY(0);
    }

    .tooltip-wrapper.align-left .tooltip-text::after {
      left: 12px;
      transform: none;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
      appearance: none;
    }

    select {
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 10px top 50%;
      background-size: 10px auto;
      padding-right: 28px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .add-section {
      background: var(--surface-color);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    button {
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      outline: none;
    }

    .form-btn-group {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }

    #addUpdateBtn {
      flex: 1;
      padding: 8px;
      background-color: var(--accent-primary);
    }

    #addUpdateBtn:hover {
      background-color: var(--accent-primary-hover);
    }

    #addUpdateBtn.edit-mode {
      background-color: #f59e0b;
    }

    #addUpdateBtn.edit-mode:hover {
      background-color: #d97706;
    }

    #cancelFormBtn {
      flex: 1;
      padding: 8px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    #cancelFormBtn:hover {
      background-color: var(--border-color);
    }

    .list-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-bottom: 12px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .list-header>label {
      margin-bottom: 0;
    }

    .filter-wrapper {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-wrapper label {
      font-size: 10px;
      margin-bottom: 0;
      cursor: pointer;
    }

    .filter-wrapper input[type="checkbox"] {
      cursor: pointer;
      margin: 0;
    }

    #elementList {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--surface-color);
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) transparent;
    }

    #elementList::-webkit-scrollbar {
      width: 6px;
    }

    #elementList::-webkit-scrollbar-track {
      background: transparent;
    }

    #elementList::-webkit-scrollbar-thumb {
      background-color: var(--border-color);
      border-radius: 6px;
    }

    .element-item {
      display: flex;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border-color);
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: transparent;
      pointer-events: none;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent-primary);
      width: 0%;
    }

    .progress-bar.fast-mode {
      width: 100% !important;
      background: linear-gradient(90deg, var(--accent-primary) 0%, #e71c4f 50%, var(--accent-primary) 100%);
      background-size: 200% 100%;
      animation: wave 1s linear infinite;
    }

    @keyframes wave {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: 0 0;
      }
    }

    .element-item:last-child {
      border-bottom: none;
    }

    .item-checkbox {
      cursor: pointer;
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
      overflow: hidden;
    }

    .item-selector {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .match-badge {
      font-size: 9px;
      background: var(--border-color);
      padding: 2px 4px;
      border-radius: 4px;
      margin-left: 6px;
      color: var(--text-main);
      text-transform: capitalize;
    }

    .item-text {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      margin-top: 2px;
    }

    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      padding: 4px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
    }

    .icon-btn.primary {
      color: var(--accent-primary);
    }

    .icon-btn.primary:hover {
      background: var(--accent-primary);
      color: white;
    }

    .icon-btn:hover {
      background: var(--surface-color);
      color: var(--text-main);
    }

    .icon-btn.danger:hover {
      color: var(--accent-danger);
    }

    .main-controls {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .main-controls button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .shortcut {
      font-size: 9px;
      opacity: 0.7;
      font-weight: 400;
    }

    #start {
      background-color: var(--accent-primary);
    }

    #start:hover {
      background-color: var(--accent-primary-hover);
    }

    #stop {
      background-color: var(--accent-danger);
    }

    #stop:hover {
      background-color: var(--accent-danger-hover);
    }

    .error {
      color: var(--accent-danger);
      font-size: 11px;
      margin-top: 4px;
      display: none;
    }

    .flex-row {
      display: flex;
      gap: 8px;
    }

    .flex-row .field {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>

<body>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <h1>Easy Clicker</h1>
      <span id="statusBadge"
        style="font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--surface-color); color: var(--text-muted); border: 1px solid var(--border-color); text-transform: uppercase; transition: all 0.2s;">IDLE</span>
    </div>
    <button id="toggleFormBtn" class="icon-btn primary"
      style="font-size: 11px; gap: 4px; align-items: center; padding: 6px 10px; font-weight: 600; border: 1px solid var(--border-color); background: var(--surface-color);">
      + Add New Element
    </button>
  </div>

  <div class="add-section" id="addSection" style="display: none;">
    <input type="hidden" id="editId">

    <div class="field">
      <label for="customName">
        Custom Name (Optional)
        <div class="tooltip-wrapper align-left">
          <span class="tooltip-icon">?</span>
          <div class="tooltip-text">A custom display name for this element in the list.</div>
        </div>
      </label>
      <input type="text" id="customName" placeholder="e.g. Buy Button">
    </div>

    <div class="flex-row">
      <div class="field">
        <label for="elementType">
          Element Type
          <div class="tooltip-wrapper align-left">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">Select the HTML tag of the element to click, or 'Any' for a custom selector.</div>
          </div>
        </label>
        <select id="elementType">
          <option value="any">Any CSS Selector</option>
          <option value="button">Button (button)</option>
          <option value="a">Link (a)</option>
          <option value="div">Div (div)</option>
          <option value="span">Span (span)</option>
          <option value="input">Input (input)</option>
          <option value="img">Image (img)</option>
        </select>
      </div>

      <div class="field">
        <label for="matchType">
          Match Elements
          <div class="tooltip-wrapper align-right">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">Choose whether to click the first, last, or all elements matching the criteria.
            </div>
          </div>
        </label>
        <select id="matchType">
          <option value="first">First</option>
          <option value="last">Last</option>
          <option value="all">All</option>
        </select>
      </div>
    </div>

    <div class="field">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px;">
        <label for="selector" style="margin-bottom: 0;">
          CSS Selector
          <div class="tooltip-wrapper align-left">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">The exact CSS selector. Required if 'Any CSS Selector' is selected.</div>
          </div>
        </label>
        <div class="tooltip-wrapper align-right" style="display: flex;">
          <button id="pickBtn" type="button"
            style="background: var(--surface-color); color: var(--text-main); font-size: 10px; padding: 2px 6px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 4px; border-radius: 4px; transition: all 0.2s; cursor: pointer;">
            Element Picker
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <circle cx="12" cy="12" r="10" />
              <circle cx="12" cy="12" r="4" />
            </svg>
          </button>
          <div class="tooltip-text"
            style="width: 175px; text-align: left; padding: 6px 8px; font-weight: normal; bottom: 120%;">
            <b style="color: var(--accent-primary);">How to use:</b><br />
            1. Click this button<br />
            2. The popup will close<br />
            3. Hover an element on page<br />
            4. Click it to save selector<br />
            5. The popup will reopen<br />
            6. Click "Add Element" to save<br />
          </div>
        </div>
      </div>
      <input type="text" id="selector" placeholder="e.g. .buy-btn or [name='submit']" autocomplete="off">
      <div id="selectorError" class="error">CSS Selector is required for "Any CSS Selector".</div>
    </div>

    <div class="field">
      <label for="targetText">
        Target Text (Optional)
        <div class="tooltip-wrapper align-left">
          <span class="tooltip-icon">?</span>
          <div class="tooltip-text">Only click elements that contain this exact text within them.</div>
        </div>
      </label>
      <input type="text" id="targetText" placeholder="e.g. Add to Cart">
    </div>

    <div class="flex-row">
      <div class="field">
        <label for="matchPattern">
          Domain Pattern
          <div class="tooltip-wrapper align-left">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">Only click elements if the URL matches this pattern. Leave Empty to match all
              URLs. Use * for placeholders (e.g. *://*.example.com/*).</div>
          </div>
        </label>
        <input type="text" id="matchPattern" placeholder="e.g. *://*.example.com/*">
      </div>

      <div class="field" style="flex: 0 0 100px;">
        <label for="itemInterval">
          Speed (s)
          <div class="tooltip-wrapper align-right">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">Custom interval. Leave empty for Global.</div>
          </div>
        </label>
        <input type="number" id="itemInterval" min="0.1" step="0.1" placeholder="Global">
      </div>
    </div>

    <div class="form-btn-group">
      <button id="addUpdateBtn">Add Element</button>
      <button id="cancelFormBtn">Cancel</button>
    </div>
  </div>

  <div id="dashboardView" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
    <div class="list-section">
      <div class="list-header">
        <label>
          Elements to Click
          <div class="tooltip-wrapper align-left">
            <span class="tooltip-icon">?</span>
            <div class="tooltip-text">Enable or disable elements directly from this list. They run in order.</div>
          </div>
        </label>
        <div class="filter-wrapper">
          <input type="checkbox" id="filterDomain" checked>
          <label for="filterDomain" title="Only show matches for this exact URL / pattern">Show Current Tab Only</label>
        </div>
      </div>
      <div id="elementList"></div>
    </div>

    <div class="field" style="margin-bottom: 12px; flex-shrink: 0;">
      <label for="interval">
        Global Click Interval (Seconds)
        <div class="tooltip-wrapper align-left">
          <span class="tooltip-icon">?</span>
          <div class="tooltip-text">How often the auto-clicker loop runs against all enabled elements.</div>
        </div>
      </label>
      <input type="number" id="interval" min="0.1" step="0.1" placeholder="e.g. 1.5">
    </div>

    <div class="field"
      style="margin-bottom: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
      <button id="openOverlayBtn"
        style="width: 100%; padding: 8px; background-color: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 8px;">
        Open Page Overlay
        <div class="tooltip-wrapper align-right" style="margin-left: 0;">
          <span class="tooltip-icon">?</span>
          <div class="tooltip-text">Displays a floating panel on the webpage so you can toggle elements without opening
            the popup.</div>
        </div>
      </button>
    </div>

    <div class="main-controls">
      <button id="start">
        Start
        <span class="shortcut">Alt+Shift+Z</span>
      </button>
      <button id="stop">
        Stop
        <span class="shortcut">Alt+Shift+X</span>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
