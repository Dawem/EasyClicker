<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>EasyClicker - Import Preset</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --border-color: #334155;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    #fileInput {
      display: none;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background-color: var(--accent-primary);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">Import Presets</h1>
    <p id="desc">Select your JSON file to import.</p>

    <label for="fileInput" class="btn">Choose File</label>
    <input type="file" id="fileInput" accept=".json">

    <div id="status"></div>
  </div>
  <script src="import_portal.js"></script>
</body>

</html>
